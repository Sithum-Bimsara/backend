<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/jpeg" href="/images/logo.png" sizes="32x32" />
  <link rel="icon" type="image/jpeg" href="/images/logo.png" sizes="64x64" />
  <link rel="apple-touch-icon" href="/images/logo.png" sizes="180x180" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary SEO (static fallback — react-helmet-async overrides per page) ── -->
  <title>LushWare | Exclusive Maldives Travel Deals</title>
  <meta name="description"
    content="Discover exclusive travel deals in the Maldives. AI-powered recommendations for resorts, local guest houses, diving, and more. Verified Maldivian operators only." />
  <meta name="keywords"
    content="Maldives travel deals, Maldives holiday packages, Maldives resort deals, Maldives diving packages, Maldives local island tours, exclusive Maldives deals" />
  <meta name="robots" content="index,follow" />
  <meta name="author" content="LushWare" />
  <link rel="canonical" href="https://lushware.com/" />

  <!-- ── Open Graph (static fallback) ── -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="LushWare" />
  <meta property="og:title" content="LushWare | Exclusive Maldives Travel Deals" />
  <meta property="og:description"
    content="Discover exclusive travel deals in the Maldives. AI-powered recommendations for resorts, local guest houses, diving, and more." />
  <meta property="og:image" content="https://lushware.com/images/hero1-1800.webp" />
  <meta property="og:image:width" content="1800" />
  <meta property="og:image:height" content="1200" />
  <meta property="og:url" content="https://lushware.com/" />
  <meta property="og:locale" content="en_US" />

  <!-- ── Twitter Card (static fallback) ── -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LushWare | Exclusive Maldives Travel Deals" />
  <meta name="twitter:description"
    content="Discover exclusive travel deals in the Maldives. AI-powered matching for resorts, diving, and local experiences." />
  <meta name="twitter:image" content="https://lushware.com/images/hero1-1800.webp" />

  <!-- ── Platform JSON-LD (TravelAgency + Marketplace) ── -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "LushWare",
      "url": "https://lushware.com",
      "logo": "https://lushware.com/images/logo.png",
      "description": "AI-powered Maldives travel deals marketplace connecting travelers with verified local operators.",
      "areaServed": {
        "@type": "Country",
        "name": "Maldives"
      },
      "sameAs": []
    }
    </script>

  <!-- Google Fonts: Playfair Display + Cormorant Garamond -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,700;1,800&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&display=swap"
    rel="stylesheet" />

  <!--
      Hero image preload — fires the download immediately on HTML parse,
      before JS bundles are evaluated and before React mounts.
    -->
  <link rel="preload" as="image" href="/images/hero1-1800.webp"
    imagesrcset="/images/hero1-600.webp 600w, /images/hero1-1200.webp 1200w, /images/hero1-1800.webp 1800w"
    imagesizes="100vw" fetchpriority="high" />
  <link rel="preload" as="image" href="/images/logo.png" />
  <link rel="preload" as="image" href="/images/default-deal.svg" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
